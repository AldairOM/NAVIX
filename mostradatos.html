<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticket NAVIX</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        margin: 0;
        padding: 25px;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg,#D5C4BC 0%,#995E8E 40%,#F08BB0 100%);
    }

    .ticket{
        max-width: 650px;
        margin: auto;
        padding: 25px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        border-left: 8px solid #995E8E;
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    h2{
        margin-top: 0;
        color: #8b4e7f;
        text-align: center;
        font-size: 26px;
    }

    .section-title{
        margin: 20px 0 8px;
        font-weight: bold;
        font-size: 16px;
        color: #6b3570;
        border-bottom: 2px solid #e8d4f0;
        padding-bottom: 4px;
    }

    .block{
        background: #faf5ff;
        padding: 12px 14px;
        border-radius: 10px;
        border-left: 4px solid #995E8E;
        margin-bottom: 14px;
    }

    .productos{
        margin-top: 8px;
        background: #fff5fb;
        padding: 10px;
        border-radius: 8px;
    }

    .totales-final{
        padding: 14px;
        background: #fff9f9;
        border-radius: 10px;
        border-left: 4px solid #995E8E;
        font-weight: 900;
        font-size: 16px;
        text-align: right;
    }

    .small { font-size: 13px; color: #444; }

    /*Estilos para el modal*/
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal-box {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        max-width: 450px;
        width: 90%;
        animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
    }

    .modal-box h3 {
        margin-top: 0;
        color: #995E8E;
        font-size: 20px;
        text-align: center;
        margin-bottom: 20px;
    }

    .modal-box input[type="email"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 15px;
        transition: border-color 0.3s;
    }

    .modal-box input[type="email"]:focus {
        outline: none;
        border-color: #995E8E;
    }

    .modal-buttons {
        display: flex;
        gap: 10px;
    }

    .modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-enviar {
        background: #995E8E;
        color: white;
    }

    .btn-enviar:hover {
        background: #7d4a72;
    }

    .btn-cancelar {
        background: #e0e0e0;
        color: #333;
    }

    .btn-cancelar:hover {
        background: #c0c0c0;
    }

    /*Estilos para el indicador de progreso*/
    .progress-indicator {
        margin-top: 15px;
        display: none;
    }

    .progress-indicator.active {
        display: block;
    }

    .progress-step {
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 6px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .progress-step.pending {
        background: #f0f0f0;
        color: #999;
    }

    .progress-step.sending {
        background: #fff3cd;
        color: #856404;
        border-left: 4px solid #ffc107;
    }

    .progress-step.sent {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }

    .progress-step .icon {
        font-size: 18px;
    }

    .container{
        max-width:1200px;
        margin:auto;
    }

    .photo-panel{
        background:white;
        border-radius:16px;
        padding:20px;
        text-align:center;
        border-left:8px solid #995E8E;
    }

    .photo-panel h5{
        color:#6b3570;
        margin-bottom:15px;
    }

    #photoBox{
        width:100%;
        height:220px;
        background:#f5f5f5;
        border-radius:12px;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
        border:2px dashed #ccc;
        color:#777;
        font-size:14px;
    }

</style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center align-items-start g-4">

        <!--Ticket-->
        <div class="col-lg-7">
            <div class="ticket shadow-lg">
                <h2>Ticket de Registro — NAVIX</h2>

                <div id="ticketData"></div>

                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary w-50" style="background:#995E8E;border:none;" onclick="window.print()">
                        Imprimir Ticket
                    </button>
                    <button class="btn btn-success w-50" style="background:#995E8E;border:none;" onclick="enviarEmail()">
                        Enviar Email
                    </button>
                </div>
            </div>
        </div>

        <!--Panel de Foto-->
        <div class="col-lg-4">
            <div class="photo-panel shadow-lg">

                <h5>Foto de Entrega</h5>

                <div id="photoBox"></div>

                <input 
                    type="file" 
                    id="EntregaPhoto"
                    accept="image/*"
                    class="form-control mt-3"
                >
                <button 
                    id="btnEntrega"
                    class="btn btn-success mt-3 w-100"
                    style="background:#995E8E;border:none;"
                    onclick="abrirModalEntrega()"
                    disabled>
                    Confirmar Entrega
                </button>
            </div>
        </div>

    </div>

    <!--Modal para registrar el email en el cual se enviará el ticket-->
    <div id="emailModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Enviar Tickets con Seguimiento</h3>
            <input 
                type="email" 
                id="emailInput" 
                placeholder="Ingresa el correo electrónico"
                required
            >

            <div class="progress-indicator" id="progressIndicator">
                <div class="progress-step pending" id="step1">
                    <span class="icon">⏳</span>
                    <span>Ticket de Confirmación</span>
                </div>
                <div class="progress-step pending" id="step2">
                    <span class="icon">⏳</span>
                    <span>Ticket En Camino</span>
                </div>
                <div class="progress-step pending" id="step3">
                    <span class="icon">⏳</span>
                    <span>Ticket Entregado</span>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-enviar" id="btnEnviar" onclick="confirmarEnvio()">Enviar Tickets</button>
            </div>
        </div>
    </div>
</div>

<script>
    const data = JSON.parse(localStorage.getItem("ticketDAMAF"));
    const box = document.querySelector("#ticketData");

    function formatMXN(n) {
        return (typeof n === "number" && !isNaN(n))
            ? n.toLocaleString("es-MX", { style: "currency", currency: "MXN" })
            : "$0.00";
    }

    function updateProgress(stepId, status, icon, text) {
        const step = document.getElementById(stepId);
        if (!step) return;

        step.className = `progress-step ${status}`;
        step.querySelector(".icon").textContent = icon;
        step.querySelector("span:last-child").textContent = text;
    }

    function resetProgress() {
        updateProgress("step1", "pending", "⏳", "Ticket de Confirmación");
        updateProgress("step2", "pending", "⏳", "Ticket En Camino");
        updateProgress("step3", "pending", "⏳", "Ticket Entregado");
    }

    function restaurarBotonModal() {
        const btnEnviar = document.getElementById("btnEnviar");
        btnEnviar.textContent = "Enviar Tickets";
        btnEnviar.onclick = confirmarEnvio;
        btnEnviar.disabled = false;
    }

    function abrirModal() {
        document.getElementById("emailModal").classList.add("active");
    }

    function cerrarModal() {
        document.getElementById("emailModal").classList.remove("active");
        document.getElementById("progressIndicator").classList.remove("active");
        resetProgress();
        restaurarBotonModal();
    }

    function llenarTicket() {
        if (!data) {
            box.innerHTML = "<p>No hay datos disponibles. Por favor, realiza un registro primero.</p>";
            return;
        }

        const fecha = new Date().toLocaleString("es-MX");

        box.innerHTML = `
            ${data.fotoCliente ? `
            <div style="text-align:center;margin-bottom:20px;">
                <img src="${data.fotoCliente}" 
                     alt="Foto del Cliente" 
                     style="width:130px;height:130px;border-radius:12px;object-fit:cover;box-shadow:0 4px 10px rgba(0,0,0,0.1);">
            </div>
            ` : ""}

            <div class="section-title">Detalles del Registro</div>
            <div class="block small">
                <strong>Fecha y Hora:</strong> ${fecha}<br>
                <strong>Proveedores:</strong> ${data.totalProveedores}<br>
                <strong>Productos:</strong> ${data.totalProductos}<br>
                <strong>Kilómetros Totales:</strong> ${data.totalKm}
            </div>

            <div class="section-title">Costos Fijos de Ruta Base</div>
            <div class="block small">
                <p class="fw-bold" style="color:#995E8E;margin-bottom:5px;">TIEMPO DE RUTA BASE</p>
                <strong>Tiempo Total Estimado:</strong> ${data.tiempoRuta.total}<br>
                <small class="d-block mt-1">(El desglose del tiempo por actividad se encuentra en cada proveedor).</small>

                <hr class="my-2">

                <p class="fw-bold" style="color:#995E8E;margin-bottom:5px;">COSTOS FIJOS (${data.totalKm})</p>
                <strong>Costo Base (Transporte):</strong> ${formatMXN(data.costoRutaAcumulado)}<br>
                • Casetas: ${formatMXN(data.costoRuta.casetas)}<br>
                • Combustible: ${formatMXN(data.costoRuta.combustible)}<br>
                • Chofer: ${formatMXN(data.costoRuta.chofer)}<br>
                • Mantenimiento: ${formatMXN(data.costoRuta.mantenimiento)}<br>
                • Desgaste de Llantas: ${formatMXN(data.costoRuta.llantas)}<br>
                • Depreciación: ${formatMXN(data.costoRuta.depreciacion)}<br>

                <small class="d-block fw-bold mt-2">Costo Promedio por Km: ${formatMXN(data.costoRuta.costoKm)}</small>
            </div>

            <div class="section-title">Datos del Cliente</div>
            <div class="block small">
                <strong>Nombre:</strong> ${data.cliente.nombre}<br>
                <strong>Teléfono:</strong> ${data.cliente.telefono}<br>
                <strong>Email:</strong> ${data.cliente.email}<br>
                <strong>Dirección:</strong> ${data.cliente.direccion}<br>
                <strong>Notas:</strong> ${data.cliente.notas || "Ninguna"}
            </div>

            <div class="section-title">Proveedores y Productos</div>
        `;

        let subtotalProductos = 0;

        data.proveedores.forEach(p => {
            subtotalProductos += p.subtotal;

            box.innerHTML += `
                <div class="block small">
                    <strong>${p.proveedor}</strong><br>
                    <small>Ruta: ${p.ruta}</small><br>
                    <small>Kilómetros: ${p.kms} km</small>

                    <div class="productos mt-2">
                        <strong>Productos:</strong><br>
                        ${p.productos.map(x => `
                            • <strong>${x.nombre}</strong><br>
                            &nbsp;&nbsp;Temperatura: <span style="color:#995E8E;">${x.temperatura}</span><br>
                            &nbsp;&nbsp;Precio por caja: ${formatMXN(x.precioPorCaja)} — 
                            Cajas: ${x.cajas} — 
                            Total: <strong>${formatMXN(x.total)}</strong><br>
                        `).join("")}
                    </div>

                    <div class="text-end fw-bold mt-2">
                        Subtotal proveedor: ${formatMXN(p.subtotal)}
                    </div>
                </div>
            `;
        });

        box.innerHTML += `
            <div class="block small" style="border-left:4px solid #F08BB0;">
                <p class="text-end m-0">Subtotal Productos: ${formatMXN(subtotalProductos)}</p>
                <p class="text-end m-0">Costo Fijo de Ruta: ${formatMXN(data.costoRutaAcumulado)}</p>
            </div>

            <div class="totales-final">
                TOTAL GENERAL: ${formatMXN(data.totalGeneral)}
            </div>

            <div class="block small" style="background:#f0f0f0;border-left:4px solid #995E8E;text-align:center;margin-top:15px;">
                <strong style="font-size:14px;color:#6b3570;">📋 CÓDIGO DE TICKET</strong><br>
                <span style="font-size:18px;font-weight:bold;color:#995E8E;letter-spacing:2px;">${data.codigoTicket}</span>
            </div>
        `;
    }

    function enviarEmail() {
        if (!data) {
            alert("No hay datos disponibles para enviar.");
            return;
        }

        abrirModal();

        const emailInput = document.getElementById("emailInput");
        if (data?.cliente?.email) {
            emailInput.value = data.cliente.email;
        }

        document.getElementById("progressIndicator").classList.remove("active");
        resetProgress();
        restaurarBotonModal();
    }

    async function confirmarEnvio() {
        const emailDestino = document.getElementById("emailInput").value.trim();
        const delayEnCamino = 0.1;
        const delayEntregado = 0.1;

        if (!emailDestino) {
            alert("Por favor ingresa un correo electrónico.");
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(emailDestino)) {
            alert("Por favor ingresa un correo electrónico válido.");
            return;
        }

        const progressIndicator = document.getElementById("progressIndicator");
        const btnEnviar = document.getElementById("btnEnviar");
        const textoOriginal = btnEnviar.textContent;

        progressIndicator.classList.add("active");
        btnEnviar.disabled = true;
        btnEnviar.textContent = "Enviando...";

        try {
            const response = await fetch("https://navix-server.onrender.com/api/enviar-tickets-seguimiento", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailDestino,
                    ticketData: data,
                    delays: {
                        enCamino: delayEnCamino,
                        entregado: delayEntregado
                    }
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            const result = await response.json();

            if (result.success) {
                updateProgress("step1", "sent", "✓", "Ticket de Confirmación - Enviado");
                updateProgress("step2", "pending", "📦", "Ticket En Camino - Programado");
                updateProgress("step3", "pending", "📸", "Esperando foto de entrega...");

                setTimeout(() => {
                    updateProgress("step2", "sending", "📦", "Ticket En Camino - Enviando...");
                    setTimeout(() => {
                        updateProgress("step2", "sent", "✓", "Ticket En Camino - Enviado");
                    }, 2000);
                }, delayEnCamino * 60 * 1000);

                alert(
                    `✅ Tickets programados correctamente\n\n` +
                    `• Confirmación: Enviado ahora\n` +
                    `• En Camino: ${delayEnCamino} min\n` +
                    `• Entregado: Hasta recibir foto de entrega`
                );
            } else {
                alert("Error al enviar los tickets: " + (result.error || "desconocido"));
                progressIndicator.classList.remove("active");
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión: " + error.message);
            progressIndicator.classList.remove("active");
        } finally {
            btnEnviar.disabled = false;
            btnEnviar.textContent = textoOriginal;
        }
    }

    function abrirModalEntrega() {
        if (!data) {
            alert("No hay datos del ticket.");
            return;
        }

        const modal = document.getElementById("emailModal");
        const progress = document.getElementById("progressIndicator");
        const btnEnviar = document.getElementById("btnEnviar");
        const emailInput = document.getElementById("emailInput");

        modal.classList.add("active");
        progress.classList.add("active");

        if (data?.cliente?.email) {
            emailInput.value = data.cliente.email;
        }

        updateProgress("step1", "sent", "✓", "Ticket de Confirmación - Enviado");
        updateProgress("step2", "sent", "✓", "Ticket En Camino - Enviado");
        updateProgress("step3", "pending", "📸", "Listo para confirmar entrega");

        btnEnviar.textContent = "Confirmar Entrega";
        btnEnviar.onclick = enviarEntregado;
        btnEnviar.disabled = false;
    }

    async function enviarEntregado() {
        const ticketData = JSON.parse(localStorage.getItem("ticketDAMAF"));
        const emailDestino = document.getElementById("emailInput").value.trim();
        const btnEnviar = document.getElementById("btnEnviar");

        if (!ticketData) {
            alert("No se encontró la información del ticket.");
            return;
        }

        if (!emailDestino) {
            alert("Debes ingresar un correo.");
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(emailDestino)) {
            alert("Correo electrónico no válido.");
            return;
        }

        btnEnviar.disabled = true;
        updateProgress("step3", "sending", "📤", "Enviando ticket de entrega...");

        try {
            const response = await fetch("https://navix-server.onrender.com/api/enviar-ticket-entregado", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailDestino: emailDestino,
                    ticketData: ticketData,
                    fotoEntrega: fotoEntregaBase64
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            const result = await response.json();

            if (result.success) {
                updateProgress("step3", "sent", "✓", "Ticket Entregado - Enviado");

                setTimeout(() => {
                    alert("✅ Entrega confirmada");
                    cerrarModal();
                }, 1000);
            } else {
                updateProgress("step3", "pending", "⚠️", "Error al enviar ticket entregado");
                alert("Error al enviar ticket: " + (result.error || "desconocido"));
                btnEnviar.disabled = false;
            }

        } catch (error) {
            console.error("Error al enviar email:", error);
            updateProgress("step3", "pending", "⚠️", "Error al enviar ticket entregado");
            alert("Error enviando ticket: " + error.message);
            btnEnviar.disabled = false;
        }
    }

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            cerrarModal();
        }
    });

    llenarTicket();
</script>

<script src="script-navix.js"></script>

</body>
</html>
